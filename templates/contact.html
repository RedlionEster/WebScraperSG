<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Metadata and external resources -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <!-- Bulma CSS framework -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.3/css/bulma.min.css">
    <!-- Custom CSS file -->
    <link rel="stylesheet" href="styles.css">
    <!-- Inline styles -->
    <style>
        /* General body styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Styling for header section */
        .header {
            background: #f5f5f5; /* Light gray background */
            color: #333; /* Dark gray text color */
            padding: 2rem 0;
            text-align: center;
            border-bottom: 1px solid #ddd; /* Subtle border to define the header */
        }
        .header .title {
            font-size: 2.5em;
            font-weight: normal;
            margin-bottom: 0.5em;
        }
        .header .subtitle {
            font-size: 1.25em;
        }
        /* Styling for custom titles and subtitles */
        .custom-title {
            font-size: 2em;
            font-weight: normal;
            color: #4a4a4a;
            margin-bottom: 0.5em;
            text-align: center;
        }
        .custom-subtitle, .content p {
            font-size: 1.25em;
            text-align: center;
            color: #333;
        }
        /* Section padding */
        .section {
            padding: 3rem 1.5rem;
        }
    </style>
</head>
<body>
    <!-- Header section with title and subtitle -->
    <header class="header">
        <div class="container">
            <h1 class="title">Contact Us</h1>
            <h2 class="subtitle">We would love to hear from you.</h2>
        </div>
    </header>

    <!-- Section for contact form -->
    <section class="section">
        <div class="container">
            <div class="content">
                <form>
                    <!-- Field for Name input -->
                    <div class="field">
                        <label class="label">Name</label>
                        <div class="control">
                            <input class="input" type="text" placeholder="Your Name">
                        </div>
                    </div>
                    <!-- Field for Email input -->
                    <div class="field">
                        <label class="label">Email</label>
                        <div class="control">
                            <input class="input" type="email" placeholder="Your Email">
                        </div>
                    </div>
                    <!-- Field for Message input -->
                    <div class="field">
                        <label class="label">Message</label>
                        <div class="control">
                            <textarea class="textarea" placeholder="Your Message"></textarea>
                        </div>
                    </div>
                    <!-- Submit button -->
                    <div class="field">
                        <div class="control">
                            <button class="button is-link">Submit</button>
                        </div>
                    </div>
                </form>
                <p>Thank you for your interest in our project :)</p>
            </div>
        </div>
    </section>
</body>
</html>
